MT_ENGINE_DEEPSEEK=DeepSeek
MT_ENGINE_DEEPSEEK_API_KEY_LABEL=DeepSeek API key
MT_ENGINE_DEEPSEEK_MODEL_LABEL=Model
MT_ENGINE_DEEPSEEK_TEMPERATURE_LABEL=Temperature
MT_ENGINE_DEEPSEEK_DYNAMIC_TEMPERATURE_LABEL=Dynamic Temperature
MT_ENGINE_DEEPSEEK_GLOSSARY_MODE_LABEL=Glossary
MT_ENGINE_DEEPSEEK_GLOSSARY_MODE_NONE=None
MT_ENGINE_DEEPSEEK_GLOSSARY_MODE_REFERENCE=Reference (AI uses judgment)
MT_ENGINE_DEEPSEEK_GLOSSARY_MODE_STRICT=Strict (always follow)
MT_ENGINE_DEEPSEEK_CONTEXT_LABEL=Context segments (above/below)
MT_ENGINE_DEEPSEEK_CONTEXT_TRUNCATION_LABEL=Context character limit
MT_ENGINE_DEEPSEEK_CONTEXT_TRUNCATION_NOLIMIT=No limit
MT_ENGINE_DEEPSEEK_API_KEY_NOTFOUND=DeepSeek API key not found.
MT_ENGINE_DEEPSEEK_BAD_RESPONSE=DeepSeek returned an unexpected response.
MT_ENGINE_DEEPSEEK_AUTO_INSERT_LABEL=Auto-insert translation into target field
MT_ENGINE_DEEPSEEK_AUTO_INSERT_TOOLTIP=When auto-mode is active (Ctrl+Shift+M), automatically fills the target segment with the machine translation result.\nEliminates the need to press Ctrl+M for each segment.
MT_ENGINE_DEEPSEEK_AUTO_HELP_LABEL=Use Ctrl+Shift+M to toggle the auto function on or off. Enable Auto-insert or Auto-confirm below to use it.
MT_ENGINE_DEEPSEEK_AUTO_CONFIRM_LABEL=Auto-confirm and go to next segment
MT_ENGINE_DEEPSEEK_AUTO_CONFIRM_TOOLTIP=When auto-mode is active, also commits the translation and moves to the next untranslated segment.\nWARNING: No chance to review!\n\nUse Ctrl+Shift+M to toggle auto-mode on/off at any time without changing these settings.
MT_ENGINE_DEEPSEEK_AUTO_GLOSSARY_LABEL=Auto-glossary (AI-suggested terms)
MT_ENGINE_DEEPSEEK_AUTO_GLOSSARY_TOOLTIP=Asks the AI to suggest key terminology pairs alongside each translation.\nEntries (with optional usage comments) are saved to deepseek_auto_glossary.txt\nin the project's glossary folder. The AI decides which terms are worth adding.
MT_ENGINE_DEEPSEEK_SELF_REVIEW_LABEL=Self-review translation (agent)
MT_ENGINE_DEEPSEEK_SELF_REVIEW_TOOLTIP=Sends the translation back to the AI for a second-pass quality check.\nReviews: tag preservation, glossary consistency, accuracy, and fluency.\nCorrects errors automatically. Adds ~1 extra API call per segment.
MT_JSON_ERROR=Invalid JSON returned by the DeepSeek API.
